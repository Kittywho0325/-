<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深空儲蓄計畫 - 獵人專屬理財終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        
        :root {
            --accent-color: #a78bfa;
            --glow-color: rgba(167, 139, 250, 0.4);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            background-attachment: fixed;
            position: relative;
        }

        /* 專屬背景與氛圍 */
        .bg-xavier { background: radial-gradient(circle at 50% 50%, #2e1065 0%, #020617 100%); --accent-color: #a78bfa; }
        .bg-zayne { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #082f49 100%); --accent-color: #7dd3fc; }
        .bg-rafayel { background: linear-gradient(135deg, #450a0a 0%, #881337 50%, #4c0519 100%); --accent-color: #fb7185; }
        .bg-sylus { background: radial-gradient(at top left, #111827 0%, #000000 100%); --accent-color: #ef4444; }

        #bg-decorations {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }

        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .deco-item { position: absolute; border-radius: 50%; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 10;
        }

        .glass-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 40px var(--glow-color);
        }

        .char-btn .avatar-box {
            filter: grayscale(1) brightness(0.6);
            transition: all 0.5s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .char-btn.active .avatar-box {
            filter: grayscale(0) brightness(1.2);
            transform: scale(1.2) translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 15px var(--accent-color);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.4s ease;
        }
        .input-field:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 20px var(--glow-color); }

        .tab-btn { position: relative; transition: all 0.3s ease; opacity: 0.5; }
        .tab-btn.active { color: var(--accent-color); opacity: 1; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: var(--accent-color); border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .config-sub-tab { transition: all 0.3s ease; }
        .config-sub-tab.active { background: var(--accent-color); color: #1e1b4b; font-weight: 900; }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent-color);
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .reward-modal { animation: modal-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes modal-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .inventory-slot {
            background: rgba(0,0,0,0.3);
            border: 1px dashed rgba(255,255,255,0.1);
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            border-radius: 1.5rem; font-size: 2.5rem;
            transition: all 0.3s ease;
        }
        .inventory-slot.filled {
            background: rgba(255,255,255,0.05); border: 1px solid var(--accent-color);
            box-shadow: inset 0 0 15px var(--glow-color);
        }

        .product-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .product-card:hover, .product-card.active {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        #qrcode-container {
            padding: 15px; background: white; border-radius: 1rem; display: inline-block; margin-bottom: 20px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-xavier p-4 md:p-8">
    <div id="bg-decorations"></div>

    <!-- 獎勵彈窗 -->
    <div id="reward-overlay" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-xl p-6">
        <div class="glass-card max-w-md w-full p-10 text-center reward-modal border-accent-color/50 border-2">
            <div id="reward-icon" class="text-8xl mb-6 filter drop-shadow-[0_0_20px_var(--accent-color)]">💍</div>
            <h2 class="text-3xl font-black mb-4 tracking-widest text-white uppercase" id="reward-title">夢想達成</h2>
            <div id="reward-char-quote" class="italic text-slate-300 mb-8 leading-relaxed"></div>
            <p class="text-[10px] text-slate-500 mb-8 uppercase tracking-[0.2em]">戰利品已存入收藏室</p>
            <button onclick="closeReward()" class="w-full py-4 bg-white text-indigo-950 font-black rounded-2xl uppercase tracking-widest hover:brightness-110 transition">收下禮物</button>
        </div>
    </div>

    <!-- 分享彈窗 -->
    <div id="share-overlay" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-xl p-6">
        <div class="glass-card max-w-md w-full p-10 text-center reward-modal border-accent-color/50 border-2">
            <h2 class="text-2xl font-black mb-6 tracking-widest text-white uppercase">分享你的儲蓄計畫</h2>
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <div class="mb-6">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-2">計畫連結</p>
                <div class="bg-black/40 p-3 rounded-lg text-xs break-all border border-white/10 text-accent-color font-mono" id="share-link"></div>
            </div>
            <button onclick="closeShare()" class="w-full py-4 bg-white text-indigo-950 font-black rounded-2xl uppercase tracking-widest hover:brightness-110 transition">返回計畫</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto relative z-10">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black tracking-[0.4em] uppercase italic bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">
                深空儲蓄計畫
            </h1>
            <div class="flex justify-center gap-4 items-center mt-4">
                <p class="text-slate-400 font-light tracking-[0.5em] text-xs uppercase">Evol Financial Terminal v3.5</p>
                <button onclick="openShare()" class="bg-accent-color/20 text-accent-color border border-accent-color/50 px-3 py-1 rounded-full text-[10px] font-bold hover:bg-accent-color hover:text-white transition">分享計畫</button>
            </div>
        </header>

        <!-- 男主選擇器 -->
        <div class="flex justify-center gap-8 mb-12 overflow-x-auto py-6 no-scrollbar">
            <button onclick="switchTheme('Xavier')" id="btn-Xavier" class="char-btn active flex flex-col items-center gap-4 group">
                <div class="avatar-box w-20 h-20 rounded-[2.5rem] bg-indigo-600 flex items-center justify-center text-4xl shadow-xl">⭐</div>
                <span class="text-[10px] font-black tracking-[0.2em] text-indigo-300 uppercase">Xavier</span>
            </button>
            <button onclick="switchTheme('Zayne')" id="btn-Zayne" class="char-btn flex flex-col items-center gap-4 group">
                <div class="avatar-box w-20 h-20 rounded-[2.5rem] bg-slate-600 flex items-center justify-center text-4xl shadow-xl">❄️</div>
                <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase">Zayne</span>
            </button>
            <button onclick="switchTheme('Rafayel')" id="btn-Rafayel" class="char-btn flex flex-col items-center gap-4 group">
                <div class="avatar-box w-20 h-20 rounded-[2.5rem] bg-rose-600 flex items-center justify-center text-4xl shadow-xl">🎨</div>
                <span class="text-[10px] font-black tracking-[0.2em] text-rose-300 uppercase">Rafayel</span>
            </button>
            <button onclick="switchTheme('Sylus')" id="btn-Sylus" class="char-btn flex flex-col items-center gap-4 group">
                <div class="avatar-box w-20 h-20 rounded-[2.5rem] bg-zinc-900 flex items-center justify-center text-4xl shadow-xl border border-red-900/30">🐦</div>
                <span class="text-[10px] font-black tracking-[0.2em] text-zinc-500 uppercase">Sylus</span>
            </button>
        </div>

        <div class="grid lg:grid-cols-2 gap-12 items-start">
            <!-- 左側：設定面板 -->
            <section class="glass-card p-10 space-y-8 min-h-[700px]">
                <div class="flex items-center justify-between border-b border-white/10 pb-6">
                    <h2 class="text-2xl font-black flex items-center gap-3 tracking-tighter">
                        <span id="char-icon" class="text-accent-color">⭐</span> 夢想設定
                    </h2>
                    <div class="flex bg-white/5 rounded-full p-1 border border-white/10">
                        <button onclick="switchConfigTab('savings')" id="config-tab-savings" class="config-sub-tab active px-4 py-1.5 rounded-full text-[10px] uppercase font-bold">儲蓄計畫</button>
                        <button onclick="switchConfigTab('investment')" id="config-tab-investment" class="config-sub-tab px-4 py-1.5 rounded-full text-[10px] uppercase font-bold">投資計畫</button>
                    </div>
                </div>
                
                <!-- 儲蓄計畫頁面 -->
                <div id="config-view-savings" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.2em]">Dream Goal</label>
                        <input type="text" id="dream-name" value="臨空市雙人旅行" class="w-full p-5 rounded-2xl input-field text-lg font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.2em]">Target Amount ($)</label>
                        <input type="number" id="target-amount" value="200000" class="w-full p-5 rounded-2xl input-field text-2xl font-black tracking-tight">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 mb-2 uppercase tracking-widest">Initial</label>
                            <input type="number" id="current-savings" value="50000" class="w-full p-5 rounded-2xl input-field font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-600 mb-2 uppercase tracking-widest">Months</label>
                            <input type="number" id="months" value="12" class="w-full p-5 rounded-2xl input-field font-bold">
                        </div>
                    </div>
                    <button onclick="initPlan('savings')" class="w-full py-6 bg-white text-indigo-950 font-black text-xl rounded-2xl transform active:scale-95 transition-all uppercase tracking-[0.3em] shadow-2xl hover:brightness-110">
                        啟動儲蓄計畫
                    </button>
                </div>

                <!-- 投資計畫頁面 -->
                <div id="config-view-investment" class="hidden space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.2em]">Investment Dream</label>
                        <input type="text" id="inv-dream-name" value="獵人榮耀基金" class="w-full p-5 rounded-2xl input-field text-lg font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.2em]">Target ($)</label>
                            <input type="number" id="inv-target-amount" value="500000" class="w-full p-4 rounded-2xl input-field font-black tracking-tight">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.2em]">Months</label>
                            <input type="number" id="inv-months" value="24" class="w-full p-4 rounded-2xl input-field font-black tracking-tight">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-3 uppercase tracking-[0.2em]">Risk Attribute</label>
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="setRisk('low')" id="risk-low" class="risk-btn p-4 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition text-[10px] font-black uppercase">保守型</button>
                            <button onclick="setRisk('mid')" id="risk-mid" class="risk-btn active p-4 rounded-2xl border border-white/10 bg-white/10 ring-1 ring-white/20 transition text-[10px] font-black uppercase">穩健型</button>
                            <button onclick="setRisk('high')" id="risk-high" class="risk-btn p-4 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition text-[10px] font-black uppercase">積極型</button>
                        </div>
                    </div>

                    <!-- 推介產品區 -->
                    <div id="recommendation-area" class="space-y-4">
                        <label class="block text-[10px] font-black text-accent-color uppercase tracking-[0.2em]">Recommended Products</label>
                        <div id="product-list" class="grid grid-cols-1 gap-3">
                            <!-- JS 動態生成 -->
                        </div>
                    </div>

                    <button onclick="initPlan('investment')" class="w-full py-6 bg-white text-indigo-950 font-black text-xl rounded-2xl transform active:scale-95 transition-all uppercase tracking-[0.3em] shadow-2xl hover:brightness-110">
                        建立投資計畫
		
                    </button>
                </div>
            </section>

            <!-- 右側：互動分頁 -->
            <section class="space-y-10">
                <div class="glass-card p-10 min-h-[780px] flex flex-col relative overflow-hidden">
                    <div class="absolute top-[-40px] right-[-40px] text-[220px] opacity-[0.04] pointer-events-none font-black italic select-none" id="bg-char-icon">⭐</div>

                    <div class="flex gap-10 mb-10 relative z-20 border-b border-white/5 pb-4 overflow-x-auto no-scrollbar">
                        <button onclick="switchView('target')" id="tab-target" class="tab-btn active text-xs font-black uppercase tracking-widest whitespace-nowrap">本月目標</button>
                        <button onclick="switchView('ledger')" id="tab-ledger" class="tab-btn text-xs font-black uppercase tracking-widest whitespace-nowrap">儲蓄清單</button>
                        <button onclick="switchView('collection')" id="tab-collection" class="tab-btn text-xs font-black uppercase tracking-widest whitespace-nowrap">收藏室</button>
                    </div>

                    <div id="view-target" class="relative z-20 flex flex-col flex-1">
                        <div class="mb-8 space-y-6">
                            <div class="flex justify-between items-start">
                                <div id="display-dream-target" class="text-4xl font-black text-white tracking-tight">未建立計畫</div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">目前進度</p>
                                    <div id="progress-percent" class="text-2xl font-black text-accent-color">0%</div>
                                </div>
                            </div>
                            <div class="bg-white/5 border border-white/10 p-8 rounded-3xl flex items-center justify-between shadow-inner">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">本月建議存入金額 (KPI)</p>
                                    <div id="monthly-kpi" class="text-4xl font-black text-white">$ 0</div>
                                </div>
                                <div class="w-14 h-14 rounded-2xl bg-accent-color/20 flex items-center justify-center text-accent-color text-2xl">💰</div>
                            </div>
                            <div id="feedback-dialogue" class="dialogue-box">
                                <p id="dialogue-text" class="text-sm leading-relaxed text-slate-200 italic">"規劃未來中...請先完成設定。"</p>
                            </div>
                        </div>
                        <div class="mt-auto border-t border-white/10 pt-8">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="font-black text-white text-xs tracking-widest uppercase">本日紀錄</h4>
                                <span class="text-[10px] text-slate-500 font-bold uppercase" id="ledger-date-target">2026.03.23</span>
                            </div>
                            <div class="flex gap-4">
                                <input type="number" id="record-amount" placeholder="本月存入額" class="flex-1 p-5 rounded-2xl input-field text-lg font-bold">
                                <button onclick="addRecord()" class="px-10 bg-white text-indigo-950 font-black rounded-2xl hover:scale-105 transition-transform shadow-2xl text-xs uppercase tracking-widest">存入</button>
                            </div>
                        </div>
                    </div>

                    <div id="view-ledger" class="hidden relative z-20 flex flex-col flex-1">
                        <h3 id="display-dream-ledger" class="text-2xl font-black text-white mb-6 tracking-tight">儲蓄軌跡</h3>
                        <div class="bg-black/30 rounded-3xl border border-white/5 overflow-hidden">
                            <div class="max-h-[500px] overflow-y-auto no-scrollbar">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-white/5 sticky top-0 z-10">
                                        <tr>
                                            <th class="p-4 font-black text-[10px] text-slate-500 uppercase">月份</th>
                                            <th class="p-4 font-black text-[10px] text-slate-500 uppercase">存入額</th>
                                            <th class="p-4 font-black text-[10px] text-slate-500 text-right uppercase">剩餘缺口</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ledger-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="view-collection" class="hidden relative z-20 flex flex-col flex-1">
                        <div class="grid grid-cols-3 gap-6 mb-12" id="inventory-grid">
                            <div class="inventory-slot"></div><div class="inventory-slot"></div><div class="inventory-slot"></div>
                            <div class="inventory-slot"></div><div class="inventory-slot"></div><div class="inventory-slot"></div>
                        </div>
                        <div class="mt-auto bg-white/5 rounded-[2.5rem] p-8 border border-white/10">
                            <div class="flex justify-between items-center mb-4"><h4 class="text-[10px] font-black uppercase text-indigo-300">兌換進度</h4><span id="exchange-count" class="text-xs font-bold text-white">0 / 3</span></div>
                            <div class="w-full h-2 bg-black/40 rounded-full mb-6 overflow-hidden"><div id="exchange-bar" class="h-full bg-accent-color shadow-[0_0_10px_var(--accent-color)]" style="width: 0%"></div></div>
                            <button id="redeem-btn" disabled onclick="redeemInvitation()" class="w-full py-5 bg-white/10 text-slate-500 font-black rounded-2xl uppercase tracking-widest transition-all">兌換約會邀請函</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const config = {
            Xavier: { name: "沈星回", accent: "#a78bfa", bodyClass: "bg-xavier", icon: "⭐", scenType: 'stars', reward: { id: 'xav_medal', icon: "🏅", title: "星辰勳章", quote: "這枚勳章代表我們共同守護的未來。辛苦了，我的獵人。" }, dialogues: { met: "做得很好。剩下的時間，要不要陪我睡一會？", unmet: "沒關係，我也常常忘記時間。下個月一起趕上吧。" } },
            Zayne: { name: "黎深", accent: "#7dd3fc", bodyClass: "bg-zayne", icon: "❄️", scenType: 'snow', reward: { id: 'zayne_ring', icon: "💍", title: "永恆冰晶戒", quote: "這是獎勵，也是承諾。從今以後，你的夢想裡必須有我。" }, dialogues: { met: "數據顯示執行力很完美。繼續保持。", unmet: "偏離計畫不是好習慣。下個月請務必精準執行。" } },
            Rafayel: { name: "祁煜", accent: "#fb7185", bodyClass: "bg-rafayel", icon: "🎨", scenType: 'bubbles', reward: { id: 'raf_pearl', icon: "🐚", title: "深海珍珠", quote: "這顆珍珠是深海最珍貴的收藏，現在是你的了。" }, dialogues: { met: "真不愧是我的獵人，太棒了！慶祝一下？", unmet: "怎麼少了這麼多？我的環島旅行要延期了嗎？一定要補回來喔！" } },
            Sylus: { name: "秦徹", accent: "#ef4444", bodyClass: "bg-sylus", icon: "🐦", scenType: 'feathers', reward: { id: 'sylus_coin', icon: "🪙", title: "黑鴉金幣", quote: "只有我能給予你這份勝利。收下它，成為我的專屬。" }, dialogues: { met: "利落。這才是我的獵人該有的執行力。", unmet: "失手了？在我的領地可不允許這種怠慢。下月連本帶利補回來。" } }
        };

        const products = {
            low: [ { name: "玉山定期儲蓄存款", rate: 0.016, desc: "極致穩定，保本首選" }, { name: "玉山全球政府債券基金", rate: 0.035, desc: "波動極低，月月領息" } ],
            mid: [ { name: "玉山精選平衡組合基金", rate: 0.065, desc: "股債搭配，抗波動首選" }, { name: "深空星系穩健型 ETF", rate: 0.075, desc: "追隨大盤，穩步增長" } ],
            high: [ { name: "玉山數位轉型優勢基金", rate: 0.12, desc: "積極佈局，追求超額報酬" }, { name: "臨空科技成長股票基金", rate: 0.15, desc: "高成長潛力，獵人限定" } ]
        };

        let currentCharacter = 'Xavier';
        let currentRisk = 'mid';
        let selectedProductRate = 0.065;
        let plan = { dream: "", target: 0, current: 0, months: 0, records: [], kpi: 0 };
        let inventory = [];

        function switchTheme(char) {
            currentCharacter = char;
            const settings = config[char];
            document.body.className = `${settings.bodyClass} p-4 md:p-8`;
            document.documentElement.style.setProperty('--accent-color', settings.accent);
            document.getElementById('char-icon').innerText = settings.icon;
            document.getElementById('bg-char-icon').innerText = settings.icon;
            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${char}`).classList.add('active');
            generateDecorations(settings.scenType);
            updateProductList();
        }

        function switchConfigTab(tab) {
            document.querySelectorAll('.config-sub-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`config-tab-${tab}`).classList.add('active');
            document.getElementById('config-view-savings').classList.toggle('hidden', tab !== 'savings');
            document.getElementById('config-view-investment').classList.toggle('hidden', tab !== 'investment');
            if(tab === 'investment') updateProductList();
        }

        function setRisk(risk) {
            currentRisk = risk;
            document.querySelectorAll('.risk-btn').forEach(btn => {
                btn.className = "risk-btn p-4 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition text-[10px] font-black uppercase";
            });
            document.getElementById(`risk-${risk}`).className = "risk-btn active p-4 rounded-2xl border border-white/10 bg-white/10 ring-1 ring-white/20 transition text-[10px] font-black uppercase";
            updateProductList();
        }

        function updateProductList() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const recs = products[currentRisk];
            recs.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = `product-card p-4 rounded-xl flex justify-between items-center ${index === 0 ? 'active' : ''}`;
                if(index === 0) selectedProductRate = p.rate;
                card.onclick = () => {
                    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedProductRate = p.rate;
                };
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="text-[11px] font-black text-white">${p.name}</div>
                        <div class="text-[9px] text-slate-400">${p.desc}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[12px] font-black text-accent-color">預期 ${(p.rate * 100).toFixed(1)}%</div>
                        <div class="text-[8px] text-slate-500 uppercase">Annualized</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function switchView(view) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${view}`).classList.add('active');
            ['target', 'ledger', 'collection'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
        }

        function initPlan(type) {
            if(type === 'savings') {
                plan.dream = document.getElementById('dream-name').value;
                plan.target = parseFloat(document.getElementById('target-amount').value);
                plan.current = parseFloat(document.getElementById('current-savings').value);
                plan.months = parseInt(document.getElementById('months').value);
                selectedProductRate = 0.012; // 儲蓄採基本利率
            } else {
                plan.dream = document.getElementById('inv-dream-name').value;
                plan.target = parseFloat(document.getElementById('inv-target-amount').value);
                plan.current = 0; // 投資通常從 0 開始
                plan.months = parseInt(document.getElementById('inv-months').value);
            }
            plan.records = [];

            const r = selectedProductRate / 12;
            const FV_current = plan.current * Math.pow(1 + r, plan.months);
            const needed = plan.target - FV_current;
            plan.kpi = needed > 0 ? Math.round(needed / ((Math.pow(1 + r, plan.months) - 1) / r)) : 0;

            document.getElementById('display-dream-target').innerText = plan.dream;
            document.getElementById('display-dream-ledger').innerText = plan.dream;
            document.getElementById('monthly-kpi').innerText = `$ ${plan.kpi.toLocaleString()}`;
            document.getElementById('dialogue-text').innerHTML = `<span class="font-black text-accent-color uppercase">${config[currentCharacter].name}：</span><br/>"投資建立成功。讓我們朝著 ${plan.dream} 邁進。"`;
            
            updateLedger();
            switchView('target');
        }

        function addRecord() {
            const amountInput = document.getElementById('record-amount');
            const amount = parseFloat(amountInput.value);
            if (!amount || isNaN(amount)) return;
            plan.records.push(amount);
            amountInput.value = '';
            updateLedger();
            showDialogue(amount >= plan.kpi);
            checkReward();
        }

        function showDialogue(met) {
            const text = document.getElementById('dialogue-text');
            const char = config[currentCharacter];
            text.innerHTML = `<span class="font-black text-accent-color uppercase">${char.name}：</span><br/>` + (met ? char.dialogues.met : char.dialogues.unmet);
        }

        function updateLedger() {
            const body = document.getElementById('ledger-body');
            body.innerHTML = '';
            let totalSaved = plan.current;
            const displayLen = Math.max(plan.months, plan.records.length);
            for (let i = 0; i < displayLen; i++) {
                const rec = plan.records[i] || 0;
                totalSaved = (totalSaved * (1 + (selectedProductRate/12))) + rec;
                const gap = Math.max(0, plan.target - totalSaved);
                const row = document.createElement('tr');
                row.className = 'ledger-row border-b border-white/5';
                row.innerHTML = `<td class="p-4 font-bold text-slate-300">M ${i+1}</td><td class="p-4 font-black text-white">$ ${rec.toLocaleString()}</td><td class="p-4 text-right font-black text-accent-color opacity-80">$ ${Math.round(gap).toLocaleString()}</td>`;
                body.appendChild(row);
            }
            const percent = Math.min(100, Math.round((totalSaved / plan.target) * 100));
            document.getElementById('progress-percent').innerText = `${percent}%`;
        }

        function checkReward() {
            let totalSaved = plan.current;
            plan.records.forEach(r => { totalSaved = (totalSaved * (1 + (selectedProductRate/12))) + r; });
            if (totalSaved >= plan.target && plan.target > 0) {
                const char = config[currentCharacter];
                if (!inventory.includes(char.reward.id)) {
                    inventory.push(char.reward.id);
                    document.getElementById('reward-icon').innerText = char.reward.icon;
                    document.getElementById('reward-title').innerText = char.reward.title;
                    document.getElementById('reward-char-quote').innerText = `"${char.name}：${char.reward.quote}"`;
                    document.getElementById('reward-overlay').classList.remove('hidden');
                }
            }
        }

        function updateInventoryUI() {
            const slots = document.getElementById('inventory-grid').querySelectorAll('.inventory-slot');
            slots.forEach(s => { s.innerHTML = ''; s.className = 'inventory-slot'; });
            inventory.forEach((id, index) => {
                if (slots[index]) {
                    let emoji = "🎁";
                    for(let k in config) if(config[k].reward.id === id) emoji = config[k].reward.icon;
                    slots[index].innerHTML = emoji;
                    slots[index].className = 'inventory-slot filled';
                }
            });
            const count = inventory.length;
            document.getElementById('exchange-count').innerText = `${count} / 3`;
            document.getElementById('exchange-bar').style.width = `${(count / 3) * 100}%`;
            document.getElementById('redeem-btn').disabled = count < 3;
        }

        function openShare() {
            const overlay = document.getElementById('share-overlay');
            const qrcodeDiv = document.getElementById('qrcode');
            const link = document.getElementById('share-link');
            const url = "https://deepspace-savings.io/share/" + Math.floor(Math.random()*9999);
            link.innerText = url;
            overlay.classList.remove('hidden');
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, { text: url, width: 180, height: 180, colorDark : "#1e1b4b", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
        }
        function closeReward() { document.getElementById('reward-overlay').classList.add('hidden'); }
        function closeShare() { document.getElementById('share-overlay').classList.add('hidden'); }

        function generateDecorations(type) {
            const container = document.getElementById('bg-decorations');
            container.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const item = document.createElement('div');
                item.className = 'deco-item';
                item.style.left = `${Math.random() * 100}%`;
                item.style.top = `${Math.random() * 100}%`;
                const size = Math.random() * 4 + 2;
                item.style.width = `${size}px`; item.style.height = `${size}px`;
                item.style.background = config[currentCharacter].accent;
                item.style.boxShadow = `0 0 10px ${config[currentCharacter].accent}`;
                item.style.animation = type === 'stars' ? `twinkle ${Math.random()*3+2}s infinite` : `fall ${Math.random()*5+5}s infinite linear`;
                container.appendChild(item);
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('ledger-date-target').innerText = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
            generateDecorations('stars');
            updateProductList();
        };
    </script>
</body>
</html>
